  2. Palantir 三层架构（Semantic-Kinetic-Dynamic）——从描述到执行到智能
  3. Ontology→Application 自动生成的可行性与局限
  4. Semantic Layer 即 Ontology 的工程化落地形态（dbt/Gartner）
  5. Ontology-as-SSOT 的三大结构性挑战

outcome: |
  注册 5 个 Concept（concept-001~005），生成 3 个 ActionProposal（prop-001~003）。
  置信度 0.78——理论基础充分但工程落地案例不够多。
  直接触发了 Phase 0 本体论落地（ontology-conventions.yaml 创建）。


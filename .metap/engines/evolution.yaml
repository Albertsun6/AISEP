# .metap/engines/evolution.yaml — 进化引擎配置 (Delegated to AIEC OS)
# 职责：在特定事件触发时，调用底层 AIEC 系统的 `evolution` 接口进行反思和蒸馏。

engine:
  name: evolution
  version: "1.0.0"
  description: "代理式自进化引擎——本引擎不包含独立逻辑，全权委托给宿主 AIEC OS 处理经验蒸馏和策略生成。"
  delegated_to: "AIEC_OS"

# ─── 委托 AIEC OS 的进化触发器 ───
# 这里定义了应用层在何时会调用 AIEC OS 的接口。

triggers:
  - id: gate_auto_observation
    event: "任意 Gate 通过后"
    # action 委托给 AIEC OS
    action: "call AIEC_OS.evolution.reflect(gate_log)"
    autonomy: L3

  - id: project_retro
    event: "AISEP S8 复盘完成"
    # action 委托给 AIEC OS
    action: "call AIEC_OS.evolution.distill(project_context)"

  - id: exploration_concluded
    event: "MetaP 探索任务结束"
    action: "call AIEC_OS.evolution.reflect(exploration_log)"

  - id: user_command_evolve
    event: "用户执行 /evolve"
    # 直接调用 AIEC 的全核进化系统
    action: "call AIEC_OS.evolution.trigger_full_evolution()"

# ─── 进化层级（由 AIEC OS 提供）───

levels:
  L0: "参数预设"
  L1: "流程调优"
  L2: "组件/系统级干预 (新增 Workflow/Tools)"
  L3: "模式层级 (Ontology schema)"
  L4: "元进化 (Config)"

# ─── 策略存储 ───

log:
  storage: "AIEC_OS.memory.store" # 由底层的知识图谱接管
  retention: "managed by AIEC OS"


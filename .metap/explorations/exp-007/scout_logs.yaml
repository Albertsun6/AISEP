# exp-007 Scout Logs

## Scout A: AI 工程自动经验提取
sub_question: "AI/LLM 驱动的软件工程中，现有系统如何实现自动经验提取和过程学习？"
strategy: industry
confidence: 0.85

findings:
  - source: { title: "Reflexion: Language Agents with Verbal Reinforcement Learning", url: "arxiv.org (NeurIPS 2023)", credibility: 0.9 }
    key_points:
      - LLM Agent 解决任务 → 识别失败 → 生成文字批评 → 存储反思 → 重试时参考
      - 在 HumanEval 编码任务上从 80% 提升到 91%
      - 核心模式: Act → Evaluate → Reflect → Store → Retry
    relevance: high

  - source: { title: "Self-Improving AI Coding Agents (NeurIPS 2025)", url: "yoheinakajima.com", credibility: 0.8 }
    key_points:
      - Agent 可自编辑代码提升 benchmark 表现
      - 关键: 需要"验证器"确认改进有效（防止退化）
      - AISEP 类比: /evolve 需要 Gate 机制确认进化有效
    relevance: high

  - source: { title: "Anthropic Claude Agent Best Practices", url: "anthropic.com", credibility: 0.9 }
    key_points:
      - Agent 设计模式: Prompt Chaining → Routing → Orchestrator-Workers
      - 反思作为独立步骤: 在工具调用链末端加 reflection step
      - 建议: 反思步骤应轻量、自动、不阻塞主流程
    relevance: medium

gaps: "缺少 process-level learning（跨任务的模式积累），现有研究多聚焦 task-level self-correction"


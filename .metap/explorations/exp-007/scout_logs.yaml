## Scout C: DevOps 自动化回顾机制
sub_question: "DevOps/MLOps 中的自动化回顾提取（post-mortem automation）有哪些成熟方案？"
strategy: case_study
confidence: 0.85

findings:
  - source: { title: "Google SRE: Postmortem Culture", url: "sre.google", credibility: 0.95 }
    key_points:
      - Blameless postmortem 三原则: 关注系统、不追责个人、可重复
      - 自动化: 自动收集时间线 + 指标 + 日志，人工分析根因和 action items
      - 关键经验: "写 postmortem 是成本中心，读 postmortem 才是利润中心"
    relevance: high

  - source: { title: "Zalando: LLM-Powered Post-Mortem Analysis", url: "zalando.com", credibility: 0.85 }
    key_points:
      - 用 LLM 分析大量历史 postmortem，提取趋势和跨事故模式
      - 从"数据金矿"中发现手动分析无法覆盖的系统性问题
      - AISEP 类比: /evolve 可以用 LLM 分析 observations.yaml 积累的数据
    relevance: high

  - source: { title: "Blameless/Rootly/Incident.io: 自动化事故管理平台", url: "rootly.com + blameless.com", credibility: 0.8 }
    key_points:
      - 自动生成事故时间线 → 结构化模板 → AI 辅助根因分析
      - 模式: 自动收集数据 → AI 预处理 → 人类审批 action items
      - 关键设计: "AI 做分析，人做决策"（与 AISEP prop-013 完全一致）
    relevance: high

gaps: "DevOps post-mortem 主要针对'故障事件'，缺少对'正常成功流程'的经验提取——AISEP 需要覆盖成功模式的检测"

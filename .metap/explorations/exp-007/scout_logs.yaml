## Scout B: 认知科学反思性实践
sub_question: "认知科学中，反思性实践和元认知监控如何实现自动化？"
strategy: academic
confidence: 0.8

findings:
  - source: { title: "Schön - The Reflective Practitioner", url: "routledge.com (经典著作)", credibility: 0.95 }
    key_points:
      - 区分 reflection-in-action（即时反思）vs reflection-on-action（事后反思）
      - AISEP 进化植入 = reflection-on-action（Gate 后触发）
      - 更高级: reflection-in-action = 在执行过程中实时调整（类比 Agent 的 self-correction）
    relevance: high

  - source: { title: "AI-Enabled Reflective Practice (ResearchGate 2024)", url: "researchgate.net", credibility: 0.8 }
    key_points:
      - AI 作为"认知脚手架"(cognitive scaffold) 辅助反思
      - 关键发现: AI 不应替代反思，而应"外化"(externalize) 隐性知识让人审视
      - AISEP 类比: Auto-Observation = 外化，/evolve 审批 = 人类审视
    relevance: high

  - source: { title: "AI Metacognition in Learning (Arizona)", url: "arizona.edu", credibility: 0.85 }
    key_points:
      - AI 的自我监控能力 = 操作层面的元认知
      - 有效元认知需要: 监控(monitoring) + 控制(control) 两个组件
      - AISEP 类比: Auto-Observation = monitoring, /evolve 审批 = control
    relevance: high

gaps: "认知科学强调反思需要'情境触发'(situated triggers)，而非定时触发——AISEP 的 Gate 触发点是否足够丰富？"


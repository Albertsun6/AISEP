# 编码标准
coding_standards:
  general:
    - "每个文件不超过 300 行（超过则拆分）"
    - "每个方法不超过 30 行（超过则提取子方法）"
    - "所有公共方法必须有 docstring"
    - "使用 f-string 而非 % 或 .format()"

  python:
    style: "PEP 8"
    type_hints: "required for public methods"
    imports:
      order: ["stdlib", "third-party", "odoo", "local"]
      style: "absolute imports only"

  xml:
    indentation: 4
    attributes_order: ["id", "model", "name", "string", "type"]
    self_closing: true          # <field name="x"/> 而非 <field name="x"></field>

  security:
    - "每个 Model 必须有 ir.model.access.csv"
    - "涉及金额的 Model 必须有 Record Rule"
    - "禁止硬编码密码或 API Key"
    - "sudo() 仅用于系统级操作"

  testing:
    - "每个 Model 至少一个基础 CRUD 测试"
    - "每个业务规则至少一个正向 + 一个反向测试"
    - "测试类继承 TransactionCase 或 HttpCase"
    - "测试方法名 test_{scenario}_{expected_result}"

  git:
    commit_format: "[{stage}] {type}: {description}"
    types: ["feat", "fix", "refactor", "test", "docs", "chore"]
    example: "[S5] feat: add BOM model with inheritance from mrp.bom"

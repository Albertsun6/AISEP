# S4 制品模板：Slice 详细设计
# 输出文件：artifacts/slices/{slice-name}/design.yaml
slice_design:
  slice_id: ""
  slice_name: ""
  stories: []                # 引用 S2 的 Story ID
  bounded_context: ""        # 引用 S1 的 Context

  models:
    - name: ""
      inherit: ""            # 如 mail.thread（框架特有）
      fields:
        - name: ""
          type: ""
          description: ""
      methods:
        - name: ""
          trigger: ""        # button | onchange | cron | api
          description: ""
          business_rule: ""

  views:
    - id: ""
      type: ""               # form | tree | kanban | search | graph
      model: ""
      key_elements: []       # 展示的关键字段/按钮

  menus:
    - name: ""
      parent: ""
      action: ""
      groups: []

  data:
    - file: ""               # demo 或 初始数据
      type: ""               # demo | data

  dependencies:
    upstream_slices: []       # 依赖的已完成 Slice
    external_modules: []     # 依赖的外部模块

  # ── 分片策略（当 design.yaml 超出阈值时触发） ──
  sharding:
    enabled: false            # AI 评估后设置；超出阈值时 → true
    thresholds:
      max_lines: 300
      max_size_kb: 8
      max_concerns: 2         # model / view / menu / security / data 各算 1
    strategy: ""              # concern | model
    # concern: design.models.yaml + design.views.yaml + design.security.yaml + design.menus.yaml
    # model:   models/{model}.yaml + views/{model}_views.yaml（适合 ≥5 Model）
    files: []                 # 分片后的文件列表

  # ── Gate 自检 ──
  gate_checklist:
    model_design: []
    view_design: []
    security: []
    dependencies: []
    pitfall_checklist: []

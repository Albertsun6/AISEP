# Auction System — Docker Compose (Production)
# 包含: Odoo 17 + PostgreSQL 15 + Nginx

services:

  # ── PostgreSQL 15 ──────────────────────────────
  db:
    image: postgres:15
    container_name: auction-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Odoo 17 ────────────────────────────────────
  odoo:
    image: odoo:17.0
    container_name: auction-odoo
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ODOO_PORT:-8069}:8069"
      - "${ODOO_LONGPOLL_PORT:-8072}:8072"
    environment:
      HOST: db
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD:-odoo}
    volumes:
      - odoo-data:/var/lib/odoo
      - ./addons/auction_lot:/mnt/addons1/auction_lot:ro
      - ./addons/auction_session:/mnt/addons1/auction_session:ro
      - ./addons/auction_bidding:/mnt/addons1/auction_bidding:ro
    command: >
      odoo
      --addons-path=/mnt/addons1,/usr/lib/python3/dist-packages/odoo/addons
      --db_host=db
      --db_user=${POSTGRES_USER:-odoo}
      --db_password=${POSTGRES_PASSWORD:-odoo}
      --workers=${ODOO_WORKERS:-4}
      --limit-time-real=${ODOO_LIMIT_TIME:-600}
      --max-cron-threads=1
      --proxy-mode

  # ── Nginx 反向代理 ─────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: auction-nginx
    restart: unless-stopped
    depends_on:
      - odoo
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  odoo-data:

version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: auction_dev
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  odoo:
    image: odoo:17
    depends_on:
      - db
    ports:
      - "8069:8069"
      - "8072:8072"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - ./artifacts/slices/slice-1/code:/mnt/extra-addons
      - odoo-data:/var/lib/odoo

volumes:
  pgdata:
  odoo-data:

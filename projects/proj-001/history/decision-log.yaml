# Decision Log — proj-001 (制造业ERP)
# 本体论类型：decision（知识层 L4）
# 从 ADR、Gate 记录、研究报告中提取的设计决策

decision_log:
  entries:
    # ══════════════════════════════════════
    # S3 架构阶段决策
    # ══════════════════════════════════════

    - id: "dec-001"
      _type: "decision"
      _links:
        - type: "validated_by"
          target: "gate_record:s3-architecture"
        - type: "references"
          target: "project:proj-001"
      title: "技术栈选择 — Odoo 17 Community Edition"
      decision: "选择 Odoo 17 CE 作为技术栈，利用内置 MRP/Sales/Purchase/Inventory 标准模块"
      rationale: |
        1. 内置领域模块覆盖 80%+ 需求，无需从零构建
        2. 通过 _inherit 扩展，开发量最小
        3. 声明式 View(XML) + Model(Python) 结构化程度高，AI 友好
        4. 17.0 版本社区活跃，官方 Docker 镜像开箱即用
      alternatives:
        - option: "ERPNext"
          reason_rejected: "制造模块功能弱于 Odoo；Frappe 框架生态较小"
        - option: "从零构建 (Django/FastAPI)"
          reason_rejected: "开发周期极长，需构建所有基础设施"
      date: "2026-03-12"
      status: "accepted"
      adr_ref: "adr/001-tech-stack.md"
      applied_to:
        - "architecture.yaml"
        - "所有 4 个自定义模块的技术选型"

    - id: "dec-002"
      _type: "decision"
      _links:
        - type: "validated_by"
          target: "gate_record:s3-architecture"
        - type: "depends_on"
          target: "decision:dec-001"
      title: "模块策略 — 全量类继承标准模块"
      decision: "所有 4 个自定义模块均通过 _inherit 扩展 Odoo 标准 Model"
      rationale: |
        1. 40 个 User Stories 分析显示标准模块已覆盖 ~85% 字段和 ~70% 业务逻辑
        2. 自定义扩展仅需少量字段（qty_variance, delivery_status, receipt_status）
        3. 标准 View 可通过 xpath 继承扩展，标准报表/Dashboard 直接可用
        4. 共用 res.partner 实现供应商/客户统一管理，避免数据孤岛
      alternatives:
        - option: "混合策略（核心域新建 Model，支撑域继承）"
          reason_rejected: "核心域（mrp）标准模块已高度成熟，新建会导致数据冗余和标准报表不可用"
        - option: "全量新建"
          reason_rejected: "标准模块完全不适用时才考虑，当前场景不适用"
      date: "2026-03-12"
      status: "accepted"
      adr_ref: "adr/002-module-strategy.md"
      applied_to:
        - "architecture.yaml"
        - "mrp_mfg, purchase_mfg, stock_mfg, sale_mfg 四个模块"

    # ══════════════════════════════════════
    # AISEP 系统级决策（跨项目）
    # ══════════════════════════════════════

    - id: "dec-003"
      _type: "decision"
      _links:
        - type: "references"
          target: "research:research-002"
      title: "本体论架构 — Palantir 三要素模型落地"
      decision: "采用 Palantir Foundry 的 Object Type + Link Type + Action Type 三要素模型作为 AISEP 全局信息架构"
      rationale: |
        1. Palantir 模型只有三个核心抽象但能建模一切，简洁且强大
        2. 与 AISEP 已有 yaml 文件架构天然兼容——只需加 _type + _links 字段
        3. 不需要建数据库引擎，AI Agent 理解并维护即可
        4. 为未来 A2A 多 Agent 架构预留了 agent_card + agent_session
      alternatives:
        - option: "RDF/OWL 标准本体论"
          reason_rejected: "过重，需要专门的推理引擎；与 yaml 轻量架构不匹配"
        - option: "不做本体论，继续靠文件路径约定"
          reason_rejected: "隐式关系无法追溯，decision 层缺失是最大缺口"
      date: "2026-03-15"
      status: "accepted"
      source_research: "research-002"
      applied_to:
        - "ontology-conventions.yaml"
        - "所有带 _type/_links 标注的 yaml 文件"

    - id: "dec-004"
      _type: "decision"
      _links:
        - type: "references"
          target: "research:research-002"
        - type: "depends_on"
          target: "decision:dec-003"
      title: "本体论落地策略 — 只加不改，渐进标注"
      decision: "在现有 yaml 文件的索引层增加 _type + _links 字段，不改动已有字段语义，不新建引擎"
      rationale: |
        1. 零侵入：已有 pipeline、workflow 不受影响
        2. 索引优先：关系标注放在索引文件而非独立条目文件，保持条目轻量
        3. AI 自维护：Agent 在 /tidy 和 Gate 时自动检查和补全
        4. 孤立 Object 检测：每个 Object 至少应有一个 Link
      alternatives:
        - option: "每个独立文件都自声明 _type + _links"
          reason_rejected: "增加每个文件的复杂度；索引文件已承担关系图谱职责"
        - option: "单独建一个 knowledge-graph.yaml 中央图谱"
          reason_rejected: "维护成本高，容易与源文件失步"
      date: "2026-03-15"
      status: "accepted"
      source_research: "research-002"
      applied_to:
        - "registry.yaml, knowledge/index.yaml, research/index.yaml, gate-log.yaml"

    # ══════════════════════════════════════
    # 研究沉淀机制决策
    # ══════════════════════════════════════

    - id: "dec-005"
      _type: "decision"
      _links:
        - type: "references"
          target: "research:research-001"
      title: "Onboard V2 — Multi-Pass Progressive Disclosure 架构"
      decision: "Onboard 逆向工程采用多轮扫描 + 渐进式展开架构（R0-R6），取代单次全量分析"
      rationale: |
        1. 行业调研显示：单次全量分析对大型系统不可行，需分层递进
        2. Multi-Pass 允许 AI 先建全局概览（R0-R1），再深入模块细节（R2-R6）
        3. 每轮产出 knowledge-graph.yaml 中间层，积累可复用知识
        4. 论述+选择模式确保人始终参与关键决策点
      alternatives:
        - option: "单次全量扫描"
          reason_rejected: "上下文窗口限制，系统越大越不可行"
        - option: "纯靠 AI 自动判断不要人参与"
          reason_rejected: "复杂系统的领域理解需要人的校准"
      date: "2026-03-15"
      status: "accepted"
      source_research: "research-001"
      applied_to:
        - "onboard.md V2 workflow"

    - id: "dec-006"
      _type: "decision"
      _links:
        - type: "references"
          target: "research:research-001"
        - type: "references"
          target: "research:research-002"
      title: "研究沉淀双轨制 — research/ 保完整上下文，knowledge/ 保精炼结论"
      decision: "调研产出同时沉淀到 .aisep/docs/research/（完整报告）和 .aisep/knowledge/（精炼认知笔记），两者不互斥"
      rationale: |
        1. 完整上下文（来源、论证、对比）对未来回溯至关重要
        2. 精炼结论（one-liner、analogy）对快速加载和 AI 理解更高效
        3. 不同使用场景需要不同密度的知识：research 用于深度回顾，note 用于快速参考
      alternatives:
        - option: "只保留 KI（Antigravity 自动提取）"
          reason_rejected: "KI 提取精度不可控，可能遗漏完整调研上下文"
        - option: "只保留 research/ 不做 knowledge/"
          reason_rejected: "完整报告信息密度低，日常使用时上下文成本太高"
      date: "2026-03-15"
      status: "accepted"
      source_research: "research-001"
      applied_to:
        - "research-precipitation-design.md"
        - ".aisep/docs/research/index.yaml"
        - ".aisep/knowledge/index.yaml"

    # ══════════════════════════════════════
    # 目录结构收敛决策
    # ══════════════════════════════════════

    - id: "dec-007"
      _type: "decision"
      _links:
        - type: "depends_on"
          target: "decision:dec-003"
        - type: "depends_on"
          target: "decision:dec-004"
      title: "知识库收敛 — 路径 A（MetaP 吸收 AISEP 知识库）"
      decision: "MetaP 概念库最终吸收 AISEP 知识库，走 bridge → migrate → unify 三阶段渐进路径"
      rationale: |
        1. .metap/ontology/ 的 schema 更强大（三层 Semantic/Kinetic/Dynamic + 推理规则）
        2. .aisep/knowledge/ 是朴素 yaml 条目，缺少推理和自动化能力
        3. 当前阶段先桥接不合并——MetaP schema 仍在演进，过早统一会固化不成熟设计
        4. 收敛判定标准：MetaP schema 连续 3 次 /explore 不改 → 进入 migrate
      alternatives:
        - option: "路径 B：AISEP 知识库吃掉 MetaP 概念库"
          reason_rejected: "AISEP knowledge 能力弱于 MetaP ontology，方向不对"
        - option: "路径 C：双轨长期共存"
          reason_rejected: "维护两套知识系统的成本随时间倍增"
      date: "2026-03-15"
      status: "accepted"
      source_research: "exp-002"
      applied_to:
        - "ontology-conventions.yaml 第五部分（收敛路线图）"
        - "knowledge/index.yaml（bridge_protocol）"
        - ".metap/ontology/concepts/index.yaml（bridge_protocol）"

  # Step 4: 认知笔记
  # ══════════════════════════════════════════════════════════════
  knowledge_entries:
    - id: "learn-001"
      topic: "TransientModel 向导模式"
      one_liner: "Odoo 用 TransientModel（临时模型）实现一次性操作，数据自动过期清理"
      analogy: "像便利贴 — 写完就丢，不占永久空间"
      key_insights:
        - "TransientModel 不在数据库中永久存储，系统定期清理"
        - "适合向导（wizard）场景：计算→展示→确认→执行"
        - "用 One2many 关联 TransientModel 行，实现明细表"
      tags: [odoo, design-pattern, database]

    - id: "learn-002"
      topic: "Odoo 版本间 API 破坏性变更"
      one_liner: "Odoo 大版本升级经常重命名字段，不向后兼容"
      analogy: "像搬家后门牌号变了 — 地址（字段名）变了，但房子（功能）还在"
      key_insights:
        - "quantity_done → quantity 是 Odoo 17 的典型例子"
        - "@api.depends 中引用错误字段名会在模块更新时才报错"
        - "最佳实践：每个新版本项目，先建 pitfalls.md 收录已知变更"
      tags: [odoo, migration, api-compatibility]

    - id: "learn-003"
      topic: "Vertical Slice 架构"
      one_liner: "按业务功能纵切而非按技术层横切，每个 Slice 交付一个完整的用户价值"
      analogy: "切蛋糕用纵切（每块都有奶油+面包+水果），不用横切（单独拿走水果层）"
      key_insights:
        - "Slice 内从 Model → View → Security → Demo 全覆盖"
        - "Slice 间通过拓扑排序确保依赖正确"
        - "MVP = 前 N 个 Slice，增强 = 后续 Slice"
      tags: [architecture, methodology, delivery]


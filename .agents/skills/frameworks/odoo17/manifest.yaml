# Odoo 17 框架元数据
framework:
  name: "odoo17"
  version: "17.0"
  edition: "community"
  language: "python3.10+"
  database: "postgresql14+"

  dependencies:
    python:
      - "odoo==17.0"
      - "psycopg2-binary"
    system:
      - "postgresql"
      - "wkhtmltopdf"

  compatibility:
    python: ">=3.10, <3.12"
    postgresql: ">=14, <=16"
    os: ["linux", "darwin"]
